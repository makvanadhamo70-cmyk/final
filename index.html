<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Internet Offer</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { background: #28a745; color: white; padding: 15px 25px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; border: none; }
        h1 { color: #d9534f; }
        .offer-img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎁 Special Offer!</h1>
        <img src="https://img.freepik.com/free-vector/fast-free-internet-concept-illustration_114360-3162.jpg" alt="Data" class="offer-img">
        <p>Aapke number par <b>2GB High-Speed Data</b> bilkul free mil raha hai.</p>
        <p>Offer ko activate karne ke liye niche diye gaye button par click karein.</p>
        
        <button class="btn" onclick="alert('Badhai ho! Aapka 2GB data jald hi activate ho jayega.')">Get 2GB Free Data</button>
    </div>

</body>
</html>
